name: Build Android APK

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

jobs:
  build:
    name: Build Android APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Setup Java JDK
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Generate Android folder (Prebuild)
        run: npx expo prebuild --platform android --no-install

      - name: Configure Debug Signing for Release Build
        run: |
          node -e "
            const fs = require('fs');
            const file = 'android/app/build.gradle';
            let content = fs.readFileSync(file, 'utf8');
            if (content.includes('signingConfig signingConfigs.debug')) {
              console.log('Signing config already present.');
            } else {
              content = content.replace(/release\s*\{/, 'release {\n            signingConfig signingConfigs.debug');
              fs.writeFileSync(file, content);
              console.log('Signing config patched successfully.');
            }
          "

      - name: Build Android Release APK
        run: |
          cd android
          ./gradlew assembleRelease

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: my-leave-apk
          path: android/app/build/outputs/apk/release/app-release.apk
          if-no-files-found: error
          retention-days: 30
