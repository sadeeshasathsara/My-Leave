name: Build Android APK

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

jobs:
  build:
    name: Build Android APK
    runs-on: ubuntu-latest

    outputs:
      package-name: com.sadeeshasathsra.myleave

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Fail on canary/prerelease dependencies
        run: |
          node -e "
            const pkg = require('./package.json');
            const deps = { ...pkg.dependencies, ...pkg.devDependencies };
            const bad = Object.entries(deps).filter(([name, version]) =>
              /canary|alpha|beta|rc|next|nightly/i.test(version)
            );
            if (bad.length) {
              console.error('Prerelease dependencies found (these can be incompatible with your Expo SDK):');
              bad.forEach(([name, version]) => console.error('  ' + name + '@' + version));
              process.exit(1);
            } else {
              console.log('No prerelease dependencies found.');
            }
          "

      - name: Check Expo project health
        run: npx expo-doctor

      - name: Setup Java JDK
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      # REQUIRED: google-services.json must be stored as a base64-encoded GitHub secret.
      # To set it up:
      #   1. Get your google-services.json from Firebase Console > Project Settings > Your Android App
      #   2. Encode it: cat google-services.json | base64  (Linux/Mac)
      #      OR on Windows PowerShell:
      #      [Convert]::ToBase64String([IO.File]::ReadAllBytes("path\to\google-services.json"))
      #   3. Add the output as a GitHub secret named GOOGLE_SERVICES_JSON
      - name: Inject google-services.json
        env:
          GOOGLE_SERVICES_JSON: ${{ secrets.GOOGLE_SERVICES_JSON }}
        run: |
          if [ -z "$GOOGLE_SERVICES_JSON" ]; then
            echo "ERROR: GOOGLE_SERVICES_JSON secret is not set. The app will crash on launch without it."
            echo "Please add it in: GitHub repo > Settings > Secrets and variables > Actions > New repository secret"
            exit 1
          fi
          echo "$GOOGLE_SERVICES_JSON" | base64 --decode > google-services.json
          echo "google-services.json injected successfully."

      - name: Generate Android folder (Prebuild)
        run: npx expo prebuild --platform android --no-install

      - name: Configure Debug Signing for Release Build
        run: |
          node -e "
            const fs = require('fs');
            const file = 'android/app/build.gradle';
            let content = fs.readFileSync(file, 'utf8');
            if (content.includes('signingConfig signingConfigs.debug')) {
              console.log('Signing config already present.');
            } else {
              content = content.replace(/release\s*\{/, 'release {\n            signingConfig signingConfigs.debug');
              fs.writeFileSync(file, content);
              console.log('Signing config patched successfully.');
            }
          "

      - name: Build Android Release APK
        run: |
          cd android
          ./gradlew assembleRelease

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: my-leave-apk
          path: android/app/build/outputs/apk/release/app-release.apk
          if-no-files-found: error
          retention-days: 30

  smoke-test:
    name: Smoke test APK on emulator
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Download APK artifact
        uses: actions/download-artifact@v4
        with:
          name: my-leave-apk

      - name: Enable KVM for emulator acceleration
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: Run emulator, install APK, and check it launches
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 33
          arch: x86_64
          profile: pixel_6
          script: |
            adb install app-release.apk
            adb shell monkey -p com.sadeeshasathsra.myleave -c android.intent.category.LAUNCHER 1
            sleep 8
            if adb shell pidof com.sadeeshasathsra.myleave; then
              echo "App launched successfully"
            else
              echo "App crashed on launch"
              adb logcat -d | grep -A 50 "FATAL EXCEPTION" || true
              exit 1
            fi